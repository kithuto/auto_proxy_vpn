name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/**'
      - '**.md'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - 'docs/**'
      - '.github/**'
      - '**.md'

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Unit tests — run on every push / PR, no cloud credentials needed
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --junitxml=junit-results.xml --cov=auto_proxy_vpn --cov-report=xml

    # -----------------------------------------------------------------------
